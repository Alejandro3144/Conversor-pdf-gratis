<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Convertidor de Imagen a PDF Gratis
    </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Convertir Imagen a PDF</h1>
        <p>Sube tu foto y descárgala como PDF al instante.</p>
        <input type="file" id="imageInput" accept="image/*"><br><br>
        <button onclick="convertirAPDF()">Descargar PDF</button>
    </div>

    <script>
        async function convertirAPDF() {
            const { jsPDF } = window.jspdf;
            const input = document.getElementById('imageInput');
            
            if (input.files.length === 0) {
                alert("Por favor, selecciona una imagen primero.");
                return;
            }

            const file = input.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const imgData = e.target.result;
                const pdf = new jsPDF();
                // Añade la imagen al PDF (ajustando un poco el tamaño)
                pdf.addImage(imgData, 'JPEG', 10, 10, 180, 160);
                pdf.save("mi-documento.pdf");
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
